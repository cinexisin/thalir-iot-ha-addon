# Thalir IoT Home Assistant Add-on manifest
# Reference: https://developers.home-assistant.io/docs/add-ons/configuration/

name: "Thalir IoT"
version: "1.1.1"
slug: thalir_iot
description: "Smart farm automation — motor starters, valve control, water level. Branded customer experience, locked-down admin."
url: "https://app.thalir.farm"
arch:
  - aarch64
  - amd64
  - armv7

# Add-on starts automatically on HA boot
startup: services
boot: auto

# Required HA Supervisor APIs
hassio_api: true
hassio_role: admin
auth_api: true
homeassistant_api: true

# Network access
ports:
  1883/tcp: 1883     # MQTT broker (local-only by default)
  5353/udp: null     # mDNS — bind to host
host_network: true   # mDNS multicast needs host networking

# Container image — INTENTIONALLY OMITTED for v1.x development.
# With no `image:` set, HA Supervisor builds the Dockerfile locally on the user's
# HA box the first time the add-on starts. That works on any arch (aarch64/amd64/armv7)
# without us having to publish multi-arch images.
# Switch to `image: "ghcr.io/<org>/thalir-iot-addon-{arch}"` once we publish to GHCR
# (tracked as F100-class roadmap item, post v1.x).

# Mappable folders
map:
  - config:rw        # for writing lovelace dashboard
  - share:rw         # for storing farm_id and pair tokens

# User-configurable options (shown in HA add-on UI)
options:
  # Identity (filled in by Installer App via QR scan, OR pasted manually)
  farm_id: ""                 # e.g. TF-A1B2
  agent_secret: ""            # one-time secret minted by cloud at pairing
  ws_url: "wss://iot-api.thalir.farm/v1/agent"

  # Customer metadata (purely informational — cloud is source of truth)
  customer_name: ""
  customer_phone: ""
  customer_language: "en"     # en | ta | hi | kn | te

  # Local LoRa gateway link
  gateway_mode: "auto"        # auto | serial | wifi
  mqtt_broker_port: 1883
  mqtt_username: "thalir_local"
  mqtt_password: ""           # auto-generated if empty

  # Cloud sync (legacy — kept for back-compat with the older haProxy path)
  cloud_sync_enabled: true
  cloud_endpoint: "https://iot-api.thalir.farm"

  log_level: "info"

# Validation schema
schema:
  farm_id: str?
  agent_secret: password?
  ws_url: str?
  customer_name: str?
  customer_phone: str?
  customer_language: list(en|ta|hi|kn|te)?
  gateway_mode: list(auto|serial|wifi)?
  mqtt_broker_port: port?
  mqtt_username: str?
  mqtt_password: password?
  cloud_sync_enabled: bool?
  cloud_endpoint: str?
  log_level: list(debug|info|warning|error)?

# Branding
panel_icon: "mdi:water-pump"
panel_title: "Thalir IoT"
panel_admin: true

# Custom UI sidebar entry
ingress: false   # we don't expose web UI — customer uses Thalir IoT mobile app
